version: '1.0'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      # Layer cache: deps rebuild only when requirements.txt changes
      cache_from:
        - vassure:latest
    image: vassure:latest
    container_name: vassure-dev          # dev only — prod uses blue/green via deploy.yml
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false                             # single source of truth; mirrors what deploy.yml writes
    environment:
      # Overrides / dev-only defaults on top of .env
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}

      # LLM – Local (OpenAI-compatible)
      - LOCAL_LLM_API_BASE_URL=${LOCAL_LLM_API_BASE_URL:-}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-}

      # S3 Proxy API
      - S3_API_BASE_URL=${S3_API_BASE_URL:-}

    volumes:
      - ./server/outputs:/app/outputs
      - ./server/data:/app/data

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3