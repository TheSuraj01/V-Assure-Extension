version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vassure-backend
    ports:
      - "8000:8000"
    environment:
      # Core application settings
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
      # Secrets
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      
      # S3 Template storage settings
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_KEY=${S3_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    volumes:
      # Persistent storage for KB index data and session outputs
      - ./server/data:/app/data
      - ./server/outputs:/app/outputs
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
