version: '3.8'

services:
  backend:
    build:
      context: ./veeva-backend
      dockerfile: Dockerfile
    container_name: veeva-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./veeva-backend/data:/app/data
      - ./veeva-backend/outputs:/app/outputs
    restart: unless-stopped

  frontend:
    build:
      context: ./veeva-scraper
      dockerfile: Dockerfile
    container_name: veeva-scraper
    ports:
      - "8080:80"
    restart: unless-stopped
