name: Deploy to Production (Self-Hosted)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Populate secrets from GitHub secrets into the production .env file
      - name: Configure Environment File
        run: |
          cat <<EOF > server/.env
          APP_ENV=production
          DEBUG=false
          LOG_LEVEL=INFO
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          LOCAL_LLM_API_BASE_URL=${{ secrets.LOCAL_LLM_API_BASE_URL }}
          LOCAL_LLM_API_KEY=${{ secrets.LOCAL_LLM_API_KEY }}
          S3_API_BASE_URL=${{ secrets.S3_API_BASE_URL }}
          EOF

      - name: Create Runtime Directories
        run: |
          mkdir -p server/outputs server/data

      - name: Build and Start Containers
        run: |
          docker compose up -d --build

      - name: Clean up old Docker images
        run: |
          docker image prune -f
